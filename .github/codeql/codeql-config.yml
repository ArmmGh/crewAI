name: "CodeQL Config"

paths-ignore:
  # Ignore template files - these are boilerplate code that shouldn't be analyzed
  - "lib/localagents/src/localagents/cli/templates/**"
  # Ignore test cassettes - these are test fixtures/recordings
  - "lib/localagents/tests/cassettes/**"
  - "lib/localagents-tools/tests/cassettes/**"
  # Ignore cache and build artifacts
  - ".cache/**"
  # Ignore documentation build artifacts
  - "docs/.cache/**"
  # Ignore experimental code
  - "lib/localagents/src/localagents/experimental/a2a/**"

paths:
  # Include GitHub Actions workflows/composite actions for CodeQL actions analysis
  - ".github/workflows/**"
  - ".github/actions/**"
  # Include all Python source code from workspace packages
  - "lib/localagents/src/**"
  - "lib/localagents-tools/src/**"
  - "lib/localagents-files/src/**"
  - "lib/devtools/src/**"
  # Include tests (but exclude cassettes via paths-ignore)
  - "lib/localagents/tests/**"
  - "lib/localagents-tools/tests/**"
  - "lib/localagents-files/tests/**"
  - "lib/devtools/tests/**"

# Configure specific queries or packs if needed
# queries:
#   - uses: security-and-quality
